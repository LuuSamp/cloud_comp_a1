server {
    listen 8000;
    server_name _;

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /ui {
        return 301 /ui/;
    }

    location /ui/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /ui/index.html;
    }

    location ~ ^/ui/.*\.js$ {
        root /usr/share/nginx/html;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }
}
